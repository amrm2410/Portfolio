spring.application.name=amr-uiux

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5433/amruiux
spring.datasource.username=amruiux
spring.datasource.password=amruiux

# JPA — manages schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Flyway — disabled, JPA handles schema
spring.flyway.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT
app.jwt.secret=r8K3pQ7xZ2mN5vB9wL4jH6tY0cF1gA8dE3sU7iO2nM5xR9qW4kJ6bV0pT8yG1hC
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# Cookie
app.cookie.secure=false
app.cookie.domain=localhost

server.port=8081
server.servlet.context-path=/api/v1

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
